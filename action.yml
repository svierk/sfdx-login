name: SFDX Login
description: Salesforce login action that either uses a SFDX Auth URL or the JWT based login flow.

branding:
  icon: log-in
  color: blue

inputs:
  sfdx-url:
    description: >
      Authorize an org using a Base64 encoded Salesforce DX (SFDX) authorization URL.
      The SFDX authorization URL must have the format "force://<clientId>:<clientSecret>:<refreshToken>@<instanceUrl>".
      NOTE: The SFDX authorization URL uses the "force" protocol, and not "http" or "https".
      Also, the "instanceUrl" inside the SFDX authorization URL doesn't include the protocol ("https://").
    required: false
  client-id:
    description: OAuth client ID (also called consumer key) of the custom connected app for the JWT login flow.
    required: false
  jwt-secret-key:
    description: Contents of the server.key file containing the private key for the JWT login flow.
    required: false
  username:
    description: Username of the user logging in for the JWT login flow.
    required: false
  set-default-dev-hub:
    description: Set the authenticated org as the default Dev Hub.
    required: false
    default: 'false'
  set-default:
    description: Set the authenticated org as the default that all org-related commands run against.
    required: false
    default: 'true'
  alias:
    description: Alias for the org.
    required: false

outputs:
  username:
    description: Username of the authenticated org.
    value: ${{ steps.login.outputs.username }}
  org-id:
    description: ID of the authenticated org.
    value: ${{ steps.login.outputs.org-id }}
  instance-url:
    description: Instance URL of the authenticated org.
    value: ${{ steps.login.outputs.instance-url }}

runs:
  using: composite
  steps:
    - name: Salesforce Org Login
      id: login
      shell: bash
      env:
        SFDX_URL: ${{ inputs.sfdx-url }}
        CLIENT_ID: ${{ inputs.client-id }}
        JWT_SECRET_KEY: ${{ inputs.jwt-secret-key }}
        USERNAME: ${{ inputs.username }}
        SET_DEFAULT_DEV_HUB: ${{ inputs.set-default-dev-hub }}
        SET_DEFAULT: ${{ inputs.set-default }}
        ALIAS: ${{ inputs.alias }}
      run: |
        set -euo pipefail

        # Persist the JWT key outside the workspace so it survives for the whole
        # job. The SF CLI stores the key path in the auth record and re-reads it
        # on every JWT token refresh (e.g. "sf org create scratch"), so the file
        # must remain available until the job ends. RUNNER_TEMP is wiped per-job.
        KEY_FILE="${RUNNER_TEMP:-.}/server.key"

        # Remove the short-lived auth URL file on exit, even if the login fails.
        # The JWT key is intentionally NOT deleted here so later steps can re-auth.
        trap 'rm -f authFile.json' EXIT

        args=()

        if [[ "$SET_DEFAULT_DEV_HUB" == "true" ]]; then
          args+=(--set-default-dev-hub)
        fi

        if [[ "$SET_DEFAULT" == "true" ]]; then
          args+=(--set-default)
        fi

        if [[ -n "$ALIAS" ]]; then
          args+=(--alias "$ALIAS")
        fi

        if [[ -n "$SFDX_URL" ]]; then
          echo "Log in to Salesforce org using Salesforce DX authorization URL..."
          echo "$SFDX_URL" | base64 --decode | jq > authFile.json
          sf org login sfdx-url --sfdx-url-file "authFile.json" "${args[@]}"
        else
          echo "Log in to Salesforce org using JSON web token (JWT)..."
          echo "$JWT_SECRET_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          sf org login jwt --client-id "$CLIENT_ID" --jwt-key-file "$KEY_FILE" --username "$USERNAME" "${args[@]}"
        fi

        # Expose details of the authenticated org as action outputs.
        target="${ALIAS:-${USERNAME:-}}"
        if [[ -n "$target" ]]; then
          org_info=$(sf org display --target-org "$target" --json)
        else
          org_info=$(sf org display --json)
        fi

        {
          echo "username=$(echo "$org_info" | jq -r '.result.username')"
          echo "org-id=$(echo "$org_info" | jq -r '.result.id')"
          echo "instance-url=$(echo "$org_info" | jq -r '.result.instanceUrl')"
        } >> "$GITHUB_OUTPUT"
